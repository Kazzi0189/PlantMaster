<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlantMaster AI v26.9</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/628/628283.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script>
        const savedTheme = localStorage.getItem('pm_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const savedTextSize = localStorage.getItem('pm_text_size');
        if (savedTextSize) document.documentElement.style.fontSize = savedTextSize;
    </script>

    <style>
        :root { 
            --p: #2e7d32; --p-dark: #1b5e20; --bg: #f4f7f6; --text: #333; --text-muted: #666;
            --card: #ffffff; --border: #eee; --input-bg: #ffffff; --input-border: #ccc;
            --warn: #d32f2f; --safe: #388e3c; --doc: #1976d2; --det: #8e24aa; --yt: #f44336;
            --shop: #ff9800; --ai-shop: #673ab7; --agro: #2e7d32;
            --shadow: rgba(0,0,0,0.06); --header-text: white;
        }
        
        [data-theme="dark"] {
            --p: #4caf50; --p-dark: #388e3c; --bg: #121212; --text: #e0e0e0; --text-muted: #aaa;
            --card: #1e1e1e; --border: #333; --input-bg: #2d2d2d; --input-border: #444;
            --warn: #ef5350; --safe: #66bb6a; --doc: #42a5f5; --det: #ab47bc; --yt: #ef5350;
            --shop: #ffb74d; --ai-shop: #9575cd; --agro: #81c784;
            --shadow: rgba(0,0,0,0.5); --header-text: #121212;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 90px; transition: background 0.3s, color 0.3s; }
        
        header { background: var(--p); color: var(--header-text); padding: 20px 15px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-align: center; margin-bottom: 10px; position: relative; z-index: 10; transition: background 0.3s; }
        header h1 { margin: 0; font-size: 1.5rem; }
        .version-tag { font-size: 0.75rem; opacity: 0.9; margin-top: 5px; display: block; font-weight: bold; }
        .header-btns { position: absolute; right: 15px; top: 20px; display: flex; gap: 10px; }
        .btn-header { background: transparent; border: none; font-size: 1.4rem; cursor: pointer; color: var(--header-text); padding: 5px; }
        
        .container { padding: 0 15px; }
        .sticky-controls { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid transparent; transition: 0.3s; }
        
        #search-box { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; outline: none; background: var(--input-bg); color: var(--text); }
        .filter-controls { display: flex; gap: 10px; }
        .filter-select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.9rem; outline: none; background: var(--input-bg); color: var(--text); }
        
        .calendar-section { background: var(--card); border-radius: 16px; padding: 15px; margin-top: 10px; margin-bottom: 20px; border-left: 5px solid var(--p); box-shadow: 0 2px 8px var(--shadow); }
        .calendar-section h3 { margin: 0 0 10px 0; color: var(--p); font-size: 1.1rem; }
        
        #calendar-tasks { max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .task-item { background: var(--bg); border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 3px var(--shadow); overflow: hidden; }
        .task-header { padding: 12px; font-size: 0.95rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .task-header strong { color: var(--p); margin-right: 5px; }
        .task-details { padding: 12px; background: var(--input-bg); border-top: 1px dashed var(--border); font-size: 0.9rem; line-height: 1.5; color: var(--text-muted); display: none; }
        
        .btn-shop { background: var(--shop); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; box-shadow: 0 2px 4px rgba(255,152,0,0.3); display: inline-block;}
        .btn-agro { background: var(--agro); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; box-shadow: 0 2px 4px rgba(46,125,50,0.3); display: inline-block;}
        .btn-done { background: var(--safe); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
 
        .card { background: var(--card); border-radius: 16px; padding: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px var(--shadow); display: flex; align-items: center; cursor: pointer; transition: 0.2s; user-select: none; border: 3px solid transparent; position: relative; }
        .card img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; margin-right: 15px; border: 1px solid var(--border); pointer-events: none; }
        .card-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: var(--p); }
        .cat-badge-small { display: inline-block; font-size: 0.7rem; background: rgba(0,150,136,0.1); color: #00897b; padding: 2px 6px; border-radius: 4px; margin-bottom: 5px; font-weight: bold; margin-right: 4px;}
        .water-badge-small { display: inline-block; font-size: 0.7rem; background: rgba(33,150,243,0.1); color: #1e88e5; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-top: 5px; display: block; width: fit-content; }
        .alert-badge { position: absolute; top: 10px; right: 10px; background: var(--warn); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; background: var(--p); color: var(--header-text); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 6px 16px rgba(0,0,0,0.3); border: none; cursor: pointer; z-index: 150; }
        
        #multi-select-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 15px; box-shadow: 0 -4px 15px rgba(0,0,0,0.2); z-index: 150; justify-content: space-between; align-items: center; border-radius: 20px 20px 0 0; }
        .btn-cancel-sel { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-weight: bold; cursor: pointer; }
        .btn-del-sel { padding: 10px 15px; border-radius: 8px; border: none; background: var(--warn); color: white; font-weight: bold; cursor: pointer; }

        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 4000; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; backdrop-filter: blur(3px); }
        .spinner { width: 40px; height: 40px; border: 4px solid #fff; border-top-color: var(--p); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        
        #settings-view, #help-view { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .settings-box, .help-box { background: var(--card); padding: 25px; border-radius: 16px; width: 85%; max-width: 320px; position: relative; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.4); color: var(--text); }
        
        #detail-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding-bottom: 30px; }
        .btn-close { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.5); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; display: flex; justify-content: center; align-items: center; z-index: 2500; }
        
        .gallery-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scroll-snap-type: x mandatory; margin-top: 40px; padding-left: 15px; padding-right: 15px; }
        .gallery-item { flex: 0 0 85%; scroll-snap-align: center; position: relative; }
        .gallery-item img { width: 100%; height: 220px; object-fit: cover; border-radius: 16px; border: 1px solid var(--border); }
        
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; touch-action: none; }
        #lightbox img { max-width: 95vw; max-height: 90vh; transition: transform 0.1s ease-out; }
        
        .btn-water-now { background: #2196f3; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 10px rgba(33,150,243,0.3); }
        
        .info-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 6px var(--shadow); border: 1px solid var(--border); }
        .info-box h4 { margin: 0 0 10px 0; color: var(--text); font-size: 0.95rem; opacity: 0.8; border-bottom: 1px solid var(--border); padding-bottom: 5px;}
        
        .history-timeline { border-left: 2px solid var(--p); padding-left: 15px; margin-left: 5px; }
        .history-entry { position: relative; margin-bottom: 15px; font-size: 0.9rem; line-height: 1.4; display: flex; justify-content: space-between; align-items: flex-start; }
        .history-entry::before { content: ''; position: absolute; left: -21px; top: 4px; width: 10px; height: 10px; background: var(--p); border-radius: 50%; }
        .btn-undo { background: rgba(0,0,0,0.05); border: none; padding: 5px 8px; border-radius: 6px; font-size: 12px; color: var(--text-muted); cursor: pointer; }
        
        textarea.notes-input { width: 100%; height: 80px; padding: 10px; border: 1px solid var(--input-border); border-radius: 8px; box-sizing: border-box; background: var(--input-bg); color: var(--text); font-family: inherit; }
        .mic-btn { position: absolute; top: 10px; right: 10px; background: var(--p); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .mic-btn.recording { background: var(--warn); animation: pulse 1s infinite; }
        
        .notify-control { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--p); }
        input:checked + .slider:before { transform: translateX(22px); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
 
<header>
    <h1>🌿 PlantMaster</h1>
    <span class="version-tag">Verze 26.9 (Hlídač a Undo systém)</span>
    <div class="header-btns">
        <button class="btn-header" onclick="openSettings()">⚙️</button>
    </div>
</header>
 
<div class="container">
    <div class="sticky-controls" id="search-container">
        <input type="text" id="search-box" placeholder="🔍 Hledat rostlinu..." onkeyup="filterPlants()">
        <div class="filter-controls">
            <select id="sort-select" class="filter-select" onchange="filterPlants()">
                <option value="newest">Nejnovější</option>
                <option value="az">A-Z</option>
           </select>
        </div>
    </div>
 
    <div class="calendar-section" id="calendar-view">
        <h3 id="calendar-title">📅 Úkoly</h3>
        <div id="calendar-tasks">Načítám...</div>
    </div>
 
    <div id="plant-list"></div>
</div>

<div id="multi-select-bar">
    <span style="font-weight: bold;">Vybráno: <span id="sel-count">0</span></span>
    <button class="btn-cancel-sel" onclick="cancelSelection()">Zrušit</button>
    <button class="btn-del-sel" onclick="deleteSelected()">🗑️ Smazat</button>
</div>
 
<div id="settings-view">
    <div class="settings-box">
        <button class="btn-modal-close" onclick="closeSettings()">✕</button>
        <h3>⚙️ Nastavení</h3>
        <button class="btn-done" style="width:100%; margin-bottom:15px;" onclick="requestNotificationPermission()">🔔 Aktivovat oznámení</button>
        <button class="btn-shop" style="width:100%; margin-bottom:10px; background:#1976d2;" onclick="exportData()">💾 Zálohovat data</button>
        <button class="btn-agro" style="width:100%; margin-bottom:10px;" onclick="document.getElementById('import-file').click()">📂 Obnovit data</button>
        <button class="btn-header" style="color:var(--text); font-size:1rem;" onclick="setKey()">🔑 Změnit API klíč</button>
        <hr>
        <button class="btn-del-sel" style="width:100%;" onclick="deleteAllData()">⚠️ SMAZAT VŠE</button>
    </div>
</div>
 
<input type="file" id="import-file" accept=".zip,.plantbak" style="display:none">
<button class="fab" id="main-fab" onclick="document.getElementById('camera-new').click()">+</button>
<input type="file" id="camera-new" accept="image/*" capture="environment" style="display:none">
<input type="file" id="camera-add" accept="image/*" capture="environment" style="display:none">
 
<div id="detail-view">
    <button class="btn-close" onclick="closeDetail()">✕</button>
    <div class="gallery-wrapper">
        <div class="gallery-scroll" id="det-gallery"></div>
        <button class="btn-add-photo" onclick="document.getElementById('camera-add').click()">📸 Přidat aktuální fotku</button>
        <div style="display: flex; gap: 10px;">
            <button class="btn-doctor" id="btn-ai-doctor" onclick="runAIDoctor()" style="display:block; background:var(--doc);">🩺 AI Doktor</button>
            <button class="btn-doctor btn-detective" id="btn-ai-detective" onclick="runAIDetective()" style="display:block;">🔎 Detektiv</button>
        </div>
    </div>
    
    <div class="detail-content">
        <h2 id="det-name">Název</h2>
        <div id="det-badges"></div>
        
        <button class="btn-water-now" onclick="waterPlantNow()">💧 ZALÍT DNES</button>
        <p id="det-last-watered" style="text-align:center; font-size:0.85rem; color:var(--text-muted);"></p>
        
        <div class="info-box">
            <h4>🔔 Hlídač zálivky</h4>
            <div style="display:flex; gap:10px; align-items:center;">
                <label style="font-size:0.9rem;">Interval (dny):</label>
                <input type="number" id="det-water-interval" style="width:50px; padding:5px; border-radius:5px; border:1px solid var(--border);" onchange="updatePlantWaterInterval()">
            </div>
            <div class="notify-control">
                <span>Posílat oznámení:</span>
                <label class="switch">
                    <input type="checkbox" id="det-notify-toggle" onchange="updatePlantNotifyToggle()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="info-box" id="det-tasks-box" style="display:none; border-color: var(--p);">
            <h4 style="color: var(--p);">🎯 Úkoly</h4>
            <div id="det-tasks-list"></div>
        </div>

        <div class="info-box"><h4>💧 Potřeba vody</h4><p id="det-water-info"></p></div>
        <div class="info-box">
            <h4>📝 Poznámky</h4>
            <div style="position: relative;">
                <textarea id="det-notes" class="notes-input"></textarea>
                <button id="btn-mic" class="mic-btn" onclick="toggleVoiceRecognition()">🎤</button>
            </div>
            <button class="btn-done" style="width:100%; margin-top:10px;" onclick="saveNotes()">💾 Uložit poznámku</button>
        </div>
        <div class="info-box" id="det-history-box" style="display:none;">
            <h4>📜 Historie péče</h4>
            <div class="history-timeline" id="det-history-list"></div>
        </div>
        <button class="btn-del-sel" id="det-delete-btn" style="width:100%;" onclick="deletePlant()">🗑️ Smazat rostlinu</button>
    </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="">
</div>
 
<div id="loader">
    <div class="spinner"></div>
    <p id="loader-text">AI pracuje...</p>
</div>
 
<script>
let db; let currentPlants = []; let openPlantId = null; 
let isSelectMode = false; let selectedPlants = new Set(); let pressTimer;

// SPEECH RECOGNITION
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition; let isRecording = false;
if (SpeechRecognition) {
    recognition = new SpeechRecognition(); recognition.lang = 'cs-CZ';
    recognition.onresult = (e) => {
        const t = e.results[0][0].transcript;
        const field = document.getElementById('det-notes');
        field.value = field.value.trim() ? field.value + "\n- " + t : "- " + t;
        stopVoiceRecognition();
    };
    recognition.onend = stopVoiceRecognition;
}
function toggleVoiceRecognition() {
    if (!SpeechRecognition) return alert("Nepodporováno.");
    if (isRecording) { recognition.stop(); } 
    else { document.getElementById('btn-mic').classList.add('recording'); isRecording = true; recognition.start(); }
}
function stopVoiceRecognition() { document.getElementById('btn-mic').classList.remove('recording'); isRecording = false; }

// DB SETUP
const req = indexedDB.open("PlantDB", 6);
req.onupgradeneeded = (e) => { db = e.target.result; if (!db.objectStoreNames.contains("plants")) db.createObjectStore("plants", { keyPath: "id", autoIncrement: true }); };
req.onsuccess = (e) => { db = e.target.result; render(); };

async function render() {
    const tx = db.transaction("plants", "readonly");
    const plants = await new Promise(res => tx.objectStore("plants").getAll().onsuccess = (e) => res(e.target.result));
    currentPlants = plants.map(p => {
        if(!p.images || p.images.length === 0) p.images = [{ data: p.img, date: p.dateAdded || "Neznámo" }];
        return p;
    }).reverse();
    filterPlants();
}

function filterPlants() {
    const query = document.getElementById('search-box').value.toLowerCase();
    let filtered = currentPlants.filter(p => p.name.toLowerCase().includes(query));
    if(document.getElementById('sort-select').value === "az") filtered.sort((a,b) => a.name.localeCompare(b.name, 'cs'));
    
    const list = document.getElementById('plant-list'); list.innerHTML = '';
    filtered.forEach((p, idx) => {
        const isSelected = selectedPlants.has(p.id);
        const style = isSelected ? 'border-color:var(--p); background:rgba(76,175,80,0.1);' : '';
        const badge = p.lastWatered ? `<div class="water-badge-small">💧 ${getWateringText(p.lastWatered)}</div>` : '';
        
        let alertIcon = '';
        if(p.lastWatered && p.waterInterval && p.notifyEnabled) {
            let next = new Date(p.lastWatered); next.setDate(next.getDate() + parseInt(p.waterInterval));
            if(new Date() > next) alertIcon = '<div class="alert-badge">!</div>';
        }

        list.innerHTML += `<div class="card" style="${style}" 
            onmousedown="startPress(event, ${p.id})" ontouchstart="startPress(event, ${p.id})" 
            onmouseup="clearPress()" ontouchend="clearPress()"
            onclick="handleCardClick(event, ${p.id}, ${currentPlants.indexOf(p)})">
            ${alertIcon}
            <img src="${p.images[p.images.length - 1].data}">
            <div class="card-info"><h3>${p.name}</h3><div class="cat-badge-small">${p.category || 'Ostatní'}</div>${badge}</div>
        </div>`;
    });
    updateCalendar(filtered);
}

function startPress(e, id) { pressTimer = setTimeout(() => { isSelectMode = true; selectedPlants.add(id); updateSelectModeUI(); filterPlants(); }, 600); }
function clearPress() { clearTimeout(pressTimer); }
function handleCardClick(e, id, idx) {
    if (isSelectMode) {
        if (selectedPlants.has(id)) selectedPlants.delete(id); else selectedPlants.add(id);
        if (selectedPlants.size === 0) isSelectMode = false;
        updateSelectModeUI(); filterPlants();
    } else { openDetail(idx); }
}
function updateSelectModeUI() {
    document.getElementById('multi-select-bar').style.display = isSelectMode ? 'flex' : 'none';
    document.getElementById('sel-count').innerText = selectedPlants.size;
    document.getElementById('main-fab').style.display = isSelectMode ? 'none' : 'flex';
}
function cancelSelection() { isSelectMode = false; selectedPlants.clear(); updateSelectModeUI(); filterPlants(); }
function deleteSelected() {
    if(!confirm("Smazat vybrané?")) return;
    const tx = db.transaction("plants", "readwrite");
    selectedPlants.forEach(id => tx.objectStore("plants").delete(id));
    tx.oncomplete = () => { cancelSelection(); render(); };
}

function updateCalendar(plantsArray) {
    const curMonth = new Date().getMonth() + 1;
    const calBox = document.getElementById('calendar-tasks'); calBox.innerHTML = '';
    let found = false;
    plantsArray.forEach(p => {
        if(p.tasks) p.tasks.forEach(task => {
            if(task.month === curMonth) {
                found = true;
                calBox.innerHTML += `<div class="task-item"><div class="task-header" onclick="toggleTask(this)"><div><strong>${p.name}:</strong> ${task.action}</div><button class="btn-done" onclick="completeTaskWithDetails(${p.id}, '${task.action.replace(/'/g, "\\'")}', ${JSON.stringify(task.products || []).replace(/"/g, '&quot;')}, event)">✓ Splnit</button></div><div class="task-details">${task.details || ''}</div></div>`;
            }
        });
    });
    if(!found) calBox.innerHTML = '<i>Bez úkolů pro tento měsíc.</i>';
}
function toggleTask(el) { const d = el.nextElementSibling; d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
function getWateringText(iso) { 
    let d = Math.floor((new Date() - new Date(iso)) / (1000 * 60 * 60 * 24)); 
    return d === 0 ? "Dnes" : (d === 1 ? "Včera" : `Před ${d} dny`); 
}

// ROZŠÍŘENÁ FUNKCE SPLNIT
async function completeTaskWithDetails(pId, action, suggested, event) {
    if(event) event.stopPropagation();
    let product = "Nepoužit žádný";
    if(suggested && suggested.length > 0) {
        let msg = `Vyberte přípravek pro: ${action}\n`;
        suggested.forEach((p, i) => msg += `${i+1}) ${p}\n`);
        let choice = prompt(msg + "\nNapište číslo nebo vlastní název:");
        if(choice) {
            let idx = parseInt(choice) - 1;
            product = (idx >= 0 && suggested[idx]) ? suggested[idx] : choice;
        }
    } else {
        let choice = prompt(`Splněn úkol: ${action}\nPoužil jste něco?`);
        if(choice) product = choice;
    }
    let ratio = product !== "Nepoužit žádný" ? prompt("V jakém poměru / množství? (např. 2ml/1l)") : "";

    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(pId).onsuccess = (e) => {
        let p = e.target.result; if(!p.history) p.history = [];
        let historyMsg = `Splněn úkol: ${action}`;
        if(product !== "Nepoužit žádný") historyMsg += ` (${product}${ratio ? ', ' + ratio : ''})`;
        p.history.push({ date: new Date().toISOString(), action: historyMsg, type: "task" });
        store.put(p).onsuccess = () => { render().then(() => { if(openPlantId === pId) openDetail(currentPlants.findIndex(x => x.id === pId)); }); };
    };
}

function openDetail(idx) {
    const p = currentPlants[idx]; openPlantId = p.id;
    const gal = document.getElementById('det-gallery'); gal.innerHTML = '';
    p.images.forEach(img => gal.innerHTML += `<div class="gallery-item"><img src="${img.data}" onclick="openLightbox('${img.data}')"></div>`);
    
    document.getElementById('det-name').innerText = p.name;
    document.getElementById('det-water-info').innerText = p.water || "Neznámé";
    document.getElementById('det-notes').value = p.notes || "";
    document.getElementById('det-last-watered').innerText = p.lastWatered ? `Naposledy zalito: ${getWateringText(p.lastWatered)}` : "Zatím nezalito";
    document.getElementById('det-water-interval').value = p.waterInterval || 0;
    document.getElementById('det-notify-toggle').checked = p.notifyEnabled || false;
    
    const histList = document.getElementById('det-history-list'); histList.innerHTML = '';
    if(p.history && p.history.length > 0) {
        document.getElementById('det-history-box').style.display = 'block';
        [...p.history].reverse().forEach((h, i) => {
            const realIdx = p.history.length - 1 - i;
            histList.innerHTML += `<div class="history-entry">
                <span><span style="font-weight:bold; color:var(--p);">${new Date(h.date).toLocaleDateString('cs-CZ')}:</span> ${h.action}</span>
                <button class="btn-undo" onclick="undoAction(${p.id}, ${realIdx})">↩️</button>
            </div>`;
        });
    } else document.getElementById('det-history-box').style.display = 'none';

    document.getElementById('detail-view').style.display = 'block';
}

function undoAction(pId, hIdx) {
    if(!confirm("Vzít tuto akci zpět?")) return;
    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(pId).onsuccess = (e) => {
        let p = e.target.result;
        const removed = p.history.splice(hIdx, 1)[0];
        if(removed.type === "water") {
            const lastW = p.history.filter(h => h.type === "water").pop();
            p.lastWatered = lastW ? lastW.date : null;
        }
        store.put(p).onsuccess = () => { render().then(() => openDetail(currentPlants.findIndex(x => x.id === pId))); };
    };
}

function updatePlantWaterInterval() {
    const val = document.getElementById('det-water-interval').value;
    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(openPlantId).onsuccess = (e) => {
        let p = e.target.result; p.waterInterval = val; store.put(p).onsuccess = render;
    };
}
function updatePlantNotifyToggle() {
    const val = document.getElementById('det-notify-toggle').checked;
    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(openPlantId).onsuccess = (e) => {
        let p = e.target.result; p.notifyEnabled = val; store.put(p).onsuccess = render;
    };
}

function waterPlantNow() {
    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(openPlantId).onsuccess = (e) => {
        let p = e.target.result; p.lastWatered = new Date().toISOString();
        if(!p.history) p.history = []; p.history.push({ date: new Date().toISOString(), action: "Zalito", type: "water" });
        store.put(p).onsuccess = () => { render().then(() => openDetail(currentPlants.findIndex(x => x.id === openPlantId))); };
    };
}

function requestNotificationPermission() {
    if (!("Notification" in window)) return alert("Váš prohlížeč nepodporuje oznámení.");
    Notification.requestPermission().then(p => { if(p === "granted") alert("Oznámení aktivována!"); });
}

function closeDetail() { document.getElementById('detail-view').style.display = 'none'; openPlantId = null; stopVoiceRecognition(); }
function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
function openSettings() { document.getElementById('settings-view').style.display = 'flex'; }
function closeSettings() { document.getElementById('settings-view').style.display = 'none'; }
function saveNotes() {
    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(openPlantId).onsuccess = (e) => {
        let p = e.target.result; p.notes = document.getElementById('det-notes').value;
        store.put(p).onsuccess = () => alert("Uloženo");
    };
}
function deletePlant() { if(confirm("Smazat?")) { db.transaction("plants", "readwrite").objectStore("plants").delete(openPlantId).onsuccess = () => { closeDetail(); render(); }; } }

document.getElementById('camera-new').onchange = async (e) => {
    const file = e.target.files[0]; const key = localStorage.getItem('G_KEY'); if(!file || !key) return;
    document.getElementById('loader').style.display = 'flex';
    const reader = new FileReader(); reader.readAsDataURL(file);
    reader.onload = async (ev) => {
        const b64 = ev.target.result.split(',')[1];
        try {
            const prompt = `Expert. JSON: {"name": "Název", "category": "Kategorie", "water": "...", "tasks": [{"month": 3, "action": "...", "details": "..."}]}`;
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: b64 } }] }], generationConfig: { response_mime_type: "application/json" } })
            });
            const data = await resp.json(); let res = JSON.parse(data.candidates[0].content.parts[0].text);
            db.transaction("plants", "readwrite").objectStore("plants").add({ ...res, images: [{ data: ev.target.result, date: new Date().toLocaleDateString('cs-CZ') }], dateAdded: new Date().toLocaleDateString('cs-CZ'), history: [] });
            document.getElementById('loader').style.display = 'none'; render();
        } catch (err) { alert("Chyba AI"); document.getElementById('loader').style.display = 'none'; }
    };
};

function exportData() {
    const zip = new JSZip(); zip.file("databaze.json", JSON.stringify(currentPlants));
    zip.generateAsync({type:"blob"}).then(c => {
        const l = document.createElement('a'); l.href = URL.createObjectURL(c); l.download = "Zaloha.plantbak"; l.click();
    });
}
function setKey() { let k = prompt("Klíč:"); if(k) localStorage.setItem('G_KEY', k.trim()); }
