<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlantMaster AI v1.0.9</title>
    <style>
        :root { --p: #2e7d32; --bg: #f8fcf8; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .version-tag { font-size: 0.8rem; color: #fff; background: #4caf50; padding: 8px; text-align: center; border-radius: 5px; margin-bottom: 15px; font-weight: bold;}
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        img { width: 100%; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; object-fit: cover; }
        button { background: var(--p); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        #loader { display: none; text-align: center; padding: 20px; font-weight: bold; color: var(--p); }
        .btn-settings { background: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="version-tag">Verze: 1.0.9 (Gemini 2.5 Flash - FINÁLE!)</div>

<div class="card">
    <h2>🌿 Moje zahrada</h2>
    <div id="plant-list">Načítání zahrady...</div>
</div>

<button onclick="document.getElementById('camera').click()">📸 VYFOTIT ROSTLINU</button>
<input type="file" id="camera" accept="image/*" capture="environment" style="display:none">

<button class="btn-settings" onclick="setKey()">⚙️ ZMĚNIT API KLÍČ</button>

<div id="loader">
    <div style="width:30px; height:30px; border:4px solid #ddd; border-top-color:var(--p); border-radius:50%; animation:spin 1s linear infinite; margin:auto;"></div>
    <p>AI analyzuje rostlinu...</p>
</div>

<script>
let db;
const req = indexedDB.open("PlantDB", 1);
req.onupgradeneeded = (e) => e.target.result.createObjectStore("plants", { keyPath: "id", autoIncrement: true });
req.onsuccess = (e) => { db = e.target.result; render(); };

function setKey() {
    const k = prompt("Vložte API klíč z Google AI Studio:");
    if (k) { localStorage.setItem('G_KEY', k.trim()); alert("Klíč uložen."); }
}

async function render() {
    const tx = db.transaction("plants", "readonly");
    const plants = await new Promise(res => tx.objectStore("plants").getAll().onsuccess = (e) => res(e.target.result));
    const list = document.getElementById('plant-list');
    list.innerHTML = plants.length ? '' : 'Zatím tu nemáte žádné kytky. Vyfoťte první!';
    plants.reverse().forEach(p => {
        list.innerHTML += `<div class="card"><img src="${p.img}"><p><b>${p.name}</b></p></div>`;
    });
}

function resizeImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_W = 800; 
                let w = img.width, h = img.height;
                if (w > MAX_W) { h = Math.round((h * MAX_W) / w); w = MAX_W; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.7)); 
            };
        };
    });
}

document.getElementById('camera').onchange = async (e) => {
    const file = e.target.files[0];
    const key = localStorage.getItem('G_KEY');
    if (!file) return;
    if (!key) return alert("Chybí API klíč! Nastavte ho šedým tlačítkem.");

    document.getElementById('loader').style.display = 'block';

    try {
        const resizedBase64 = await resizeImage(file);
        const b64Data = resizedBase64.split(',')[1];
        
        // ZÁZRAK: Používáme model gemini-2.5-flash z tvého seznamu!
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
            method: 'POST',
            cache: 'no-store',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [
                    { text: "Jsi expert na rostliny. Identifikuj tuto rostlinu na fotce. Odpověz POUZE čistým JSON formátem bez jakéhokoliv dalšího textu nebo markdownu: {\"name\":\"Český název rostliny\"}" },
                    { inline_data: { mime_type: "image/jpeg", data: b64Data } }
                ]}]
            })
        });

        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error?.message || "Neznámá chyba API");

        const aiText = data.candidates[0].content.parts[0].text;
        
        // Bezpečné parsování JSONu
        const cleanText = aiText.replace(/```json/g, "").replace(/```/g, "").trim();
        const jsonStart = cleanText.indexOf('{');
        const jsonEnd = cleanText.lastIndexOf('}') + 1;
        const res = JSON.parse(cleanText.substring(jsonStart, jsonEnd));

        const tx = db.transaction("plants", "readwrite");
        tx.objectStore("plants").add({ name: res.name, img: resizedBase64 });
        tx.oncomplete = () => { 
            document.getElementById('loader').style.display = 'none'; 
            render(); 
        };

    } catch (err) {
        document.getElementById('loader').style.display = 'none';
        alert("Chyba: " + err.message);
    }
};
</script>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
