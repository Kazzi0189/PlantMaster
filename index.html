<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlantMaster AI v20.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/628/628283.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root { --p: #2e7d32; --bg: #f4f7f6; --text: #333; --card: #ffffff; --warn: #d32f2f; --safe: #388e3c; --doc: #1976d2; --det: #8e24aa; --yt: #f44336; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 90px; }
        
        header { background: var(--p); color: white; padding: 20px 15px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; position: relative; }
        header h1 { margin: 0; font-size: 1.5rem; }
        .version-tag { font-size: 0.75rem; opacity: 0.8; margin-top: 5px; display: block; }
        .header-btns { position: absolute; right: 15px; top: 20px; display: flex; gap: 10px; }
        .btn-header { background: transparent; border: none; font-size: 1.4rem; cursor: pointer; color: white; padding: 5px; }
        
        .container { padding: 0 15px; }
        
        #search-box { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        
        .card { background: var(--card); border-radius: 16px; padding: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .card img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; margin-right: 15px; border: 1px solid #eee; }
        .card-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: var(--p); }
        
        .fab { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; background: var(--p); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 6px 16px rgba(46,125,50,0.4); border: none; cursor: pointer; z-index: 100; }
        
        #settings-view, #help-view { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .settings-box { background: white; padding: 25px; border-radius: 16px; width: 85%; max-width: 320px; position: relative; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .help-box { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 500px; height: 85vh; position: relative; overflow-y: auto; text-align: left; }
        
        .btn-modal-close { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; background: #eee; border: none; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        
        #detail-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 500; overflow-y: auto; padding-bottom: 30px; }
        .gallery-wrapper { padding: 15px 15px 0 15px; }
        .gallery-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .gallery-item { flex: 0 0 85%; position: relative; }
        .gallery-item img { width: 100%; height: 220px; object-fit: cover; border-radius: 16px; border: 1px solid #ddd; }
        
        .notes-container { position: relative; width: 100%; margin-bottom: 10px; }
        textarea.notes-input { width: 100%; height: 100px; padding: 12px; padding-right: 45px; border: 1px solid #ccc; border-radius: 12px; font-family: inherit; box-sizing: border-box; font-size: 0.95rem; }
        .btn-voice { position: absolute; top: 10px; right: 10px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 50%; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .btn-voice.recording { background: #ffebee; border-color: #d32f2f; color: #d32f2f; animation: pulse 1.5s infinite; }
        
        .btn-menu { display: block; margin: 10px auto; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 0.95rem; cursor: pointer; width: 100%; }
        .btn-danger { background: var(--warn); box-shadow: 0 4px 10px rgba(211,47,47,0.3); }
        .btn-delete { background: #ffebee; color: var(--warn); border: 1px solid #ffcdd2; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: var(--p); border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>🌿 PlantMaster</h1>
    <span class="version-tag">Verze 20.0 (Správa a mazání dat)</span>
    <div class="header-btns">
        <button class="btn-header" onclick="openHelp()">❓</button>
        <button class="btn-header" onclick="openSettings()">⚙️</button>
    </div>
</header>

<div class="container">
    <input type="text" id="search-box" placeholder="🔍 Hledat rostlinu..." onkeyup="filterPlants()">
    <div id="plant-list"></div>
</div>

<div id="help-view">
    <div class="help-box">
        <button class="btn-modal-close" onclick="closeHelp()">✕</button>
        <div style="padding: 20px;">
            <h2>📖 Manuál</h2>
            <p><strong>Mazání:</strong> Rostlinu smažete v jejím detailu úplným sjezdem dolů. Pokud chcete vymazat celou zahradu, použijte Nastavení ⚙️.</p>
            <p><strong>Hlas:</strong> Klepněte na mikrofon 🎙️ u poznámek a mluvte. Telefon vše zapíše.</p>
        </div>
    </div>
</div>

<div id="settings-view">
    <div class="settings-box">
        <button class="btn-modal-close" onclick="closeSettings()">✕</button>
        <h3>⚙️ Nastavení</h3>
        <button class="btn-menu" onclick="exportData()" style="background:#1976d2;">💾 ZÁLOHOVAT (.plantbak)</button>
        <button class="btn-menu" onclick="document.getElementById('import-file').click()" style="background:#388e3c;">📂 OBNOVIT ZE ZÁLOHY</button>
        <button class="btn-menu btn-danger" onclick="deleteAllPlants()">🗑️ SMAZAT VŠE</button>
        <button class="btn-menu" onclick="setKey()" style="background:#757575;">🔑 API KLÍČ</button>
    </div>
</div>

<input type="file" id="import-file" accept=".plantbak" style="display:none">
<button class="fab" onclick="document.getElementById('camera-new').click()">+</button>
<input type="file" id="camera-new" accept="image/*" capture="environment" style="display:none">
<input type="file" id="camera-add" accept="image/*" capture="environment" style="display:none">

<div id="detail-view">
    <button class="btn-modal-close" onclick="closeDetail()" style="position:fixed; left:15px; top:15px; background:rgba(0,0,0,0.5); color:white;">✕</button>
    <div class="gallery-wrapper" style="margin-top:60px;">
        <div class="gallery-scroll" id="det-gallery"></div>
        <button class="btn-menu" onclick="document.getElementById('camera-add').click()" style="background:var(--p);">📸 PŘIDAT FOTKU</button>
    </div>
    
    <div style="padding: 20px;">
        <h2 id="det-name" style="color:var(--p);">Název</h2>
        <div class="notes-container">
            <textarea id="det-notes" class="notes-input" placeholder="Poznámky..."></textarea>
            <button id="btn-voice-input" class="btn-voice">🎙️</button>
        </div>
        <button onclick="saveNotes()" style="width:100%; background:var(--p); color:white; padding:15px; border:none; border-radius:12px; font-weight:bold;">💾 ULOŽIT POZNÁMKY</button>
        
        <button class="btn-delete" id="det-delete-btn">🗑️ SMAZAT ROSTLINU ZE ZAHRADY</button>
    </div>
</div>

<div id="loader"><div class="spinner"></div><p id="loader-text">Pracuji...</p></div>

<script>
let db;
let currentPlants = [];
let openPlantId = null;
let recognition;

// DATABÁZE
const req = indexedDB.open("PlantDB", 5);
req.onsuccess = (e) => { db = e.target.result; render(); };
req.onupgradeneeded = (e) => {
    let d = e.target.result;
    if (!d.objectStoreNames.contains("plants")) d.createObjectStore("plants", { keyPath: "id", autoIncrement: true });
};

// HLAS
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'cs-CZ';
    recognition.continuous = true;
    recognition.onresult = (event) => {
        const textarea = document.getElementById('det-notes');
        textarea.value += (textarea.value ? ' ' : '') + event.results[event.results.length-1][0].transcript;
    };
    recognition.onstart = () => document.getElementById('btn-voice-input').classList.add('recording');
    recognition.onend = () => document.getElementById('btn-voice-input').classList.remove('recording');
}

document.getElementById('btn-voice-input').onclick = () => {
    if(!recognition) return alert("Hlasové zadávání není podporováno.");
    document.getElementById('btn-voice-input').classList.contains('recording') ? recognition.stop() : recognition.start();
};

async function render() {
    const tx = db.transaction("plants", "readonly");
    const plants = await new Promise(res => tx.objectStore("plants").getAll().onsuccess = (e) => res(e.target.result));
    currentPlants = plants.reverse();
    filterPlants();
}

function filterPlants() {
    const q = document.getElementById('search-box').value.toLowerCase();
    const list = document.getElementById('plant-list');
    list.innerHTML = '';
    currentPlants.filter(p => p.name.toLowerCase().includes(q)).forEach(p => {
        const img = p.images ? p.images[p.images.length-1].data : '';
        list.innerHTML += `<div class="card" onclick="openDetail(${currentPlants.indexOf(p)})"><img src="${img}"><h3>${p.name}</h3></div>`;
    });
}

function openDetail(index) {
    const p = currentPlants[index]; openPlantId = p.id;
    document.getElementById('det-name').innerText = p.name;
    document.getElementById('det-notes').value = p.notes || '';
    const gal = document.getElementById('det-gallery'); gal.innerHTML = '';
    (p.images || []).forEach(i => gal.innerHTML += `<div class="gallery-item"><img src="${i.data}"></div>`);
    
    // Funkce pro smazání konkrétní rostliny
    document.getElementById('det-delete-btn').onclick = () => deletePlant(p.id);
    document.getElementById('detail-view').style.display = 'block';
}

function deletePlant(id) {
    if (confirm("Opravdu chcete tuto rostlinu smazat? Tato akce je nevratná.")) {
        const tx = db.transaction("plants", "readwrite");
        tx.objectStore("plants").delete(id);
        tx.oncomplete = () => { closeDetail(); render(); };
    }
}

function deleteAllPlants() {
    if (confirm("⚠️ VAROVÁNÍ: Opravdu chcete smazat CELOU vaši zahradu?")) {
        if (confirm("Tato akce smaže úplně všechna data a fotky. Jste si naprosto jistí?")) {
            const tx = db.transaction("plants", "readwrite");
            tx.objectStore("plants").clear();
            tx.oncomplete = () => { alert("Zahrada byla kompletně vymazána."); closeSettings(); render(); };
        }
    }
}

function closeDetail() { document.getElementById('detail-view').style.display = 'none'; if(recognition) recognition.stop(); }
function openSettings() { document.getElementById('settings-view').style.display = 'flex'; }
function closeSettings() { document.getElementById('settings-view').style.display = 'none'; }
function openHelp() { document.getElementById('help-view').style.display = 'flex'; }
function closeHelp() { document.getElementById('help-view').style.display = 'none'; }

function saveNotes() {
    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(openPlantId).onsuccess = (e) => {
        let p = e.target.result; p.notes = document.getElementById('det-notes').value;
        store.put(p).onsuccess = () => { alert("Uloženo!"); };
    };
}

async function exportData() {
    const zip = new JSZip(); const photoFolder = zip.folder("Fotky");
    let plantsToExport = JSON.parse(JSON.stringify(currentPlants));
    plantsToExport.forEach((p, pi) => {
        (p.images || []).forEach((img, ii) => {
            const fn = `foto_${p.id}_${ii}.jpg`;
            photoFolder.file(fn, img.data.split(',')[1], {base64: true});
            img.exportPath = fn; delete img.data;
        });
    });
    zip.file("databaze.json", JSON.stringify(plantsToExport));
    const content = await zip.generateAsync({type:"blob"});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(content);
    link.download = `Zahrada_${new Date().toISOString().slice(0,10)}.plantbak`;
    link.click();
}

function setKey() { const k = prompt("API Klíč:"); if(k) localStorage.setItem('G_KEY', k); }

document.getElementById('camera-new').onchange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    const key = localStorage.getItem('G_KEY'); if (!key) return alert("Chybí API klíč.");
    document.getElementById('loader').style.display = 'flex';
    const reader = new FileReader();
    reader.onload = async (ev) => {
        const b64 = ev.target.result.split(',')[1];
        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro-vision:generateContent?key=${key}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Identify this plant in Czech. Answer ONLY in JSON: {\"name\": \"Name\"}" }, { inline_data: { mime_type: "image/jpeg", data: b64 } }] }] })
            });
            const d = await resp.json();
            const res = JSON.parse(d.candidates[0].content.parts[0].text);
            const tx = db.transaction("plants", "readwrite");
            tx.objectStore("plants").add({ name: res.name, images: [{ data: ev.target.result, date: new Date().toLocaleDateString('cs-CZ') }] });
            tx.oncomplete = () => { document.getElementById('loader').style.display = 'none'; render(); };
        } catch (err) { alert("Chyba AI"); document.getElementById('loader').style.display = 'none'; }
    };
    reader.readAsDataURL(file);
};
</script>
</body>
</html>
