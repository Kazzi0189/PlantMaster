<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlantMaster AI - Fáze 2 (Péče & Deník)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root { 
            --p: #2e7d32; --bg: #f4f7f6; --text: #333; --text-muted: #666;
            --card: #ffffff; --border: #eee; --input-bg: #ffffff;
            --warn: #d32f2f; --safe: #388e3c; --header-text: white;
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 90px; }
        
        header { background: var(--p); color: var(--header-text); padding: 20px 15px; border-radius: 0 0 20px 20px; text-align: center; margin-bottom: 10px; position: relative; }
        header h1 { margin: 0; font-size: 1.5rem; }
        .version-tag { font-size: 0.75rem; opacity: 0.9; margin-top: 5px; display: block; }
        
        .header-btns { position: absolute; right: 15px; top: 20px; }
        .btn-header { background: transparent; border: none; font-size: 1.4rem; cursor: pointer; color: white; }
        
        .container { padding: 0 15px; }
        .sticky-controls { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; }
        
        #search-box { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .filter-controls { display: flex; gap: 10px; }
        .filter-select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); }
        
        .calendar-section { background: var(--card); border-radius: 16px; padding: 15px; margin-top: 10px; margin-bottom: 20px; border-left: 5px solid var(--p); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .calendar-section h3 { margin: 0 0 10px 0; color: var(--p); font-size: 1.1rem; }
        
        #calendar-tasks { max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .task-item { background: var(--bg); border-radius: 8px; margin-bottom: 8px; padding: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
        .task-item strong { color: var(--p); margin-right: 5px; }
        .btn-done { background: var(--safe); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; margin-left: 10px;}
        
        .card { background: var(--card); border-radius: 16px; padding: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; cursor: pointer; }
        .card img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; margin-right: 15px; pointer-events: none; }
        .card-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: var(--p); }
        .cat-badge-small { display: inline-block; font-size: 0.7rem; background: rgba(0,150,136,0.1); color: #00897b; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .water-badge-small { display: inline-block; font-size: 0.7rem; background: rgba(33,150,243,0.1); color: #1e88e5; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-top: 5px; display: block; width: fit-content; }
        
        .fab { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; background: var(--p); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 6px 16px rgba(0,0,0,0.3); border: none; cursor: pointer; z-index: 150; }
        
        #detail-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding-bottom: 30px; }
        .btn-close { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.5); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 2500; }
        
        .gallery-wrapper { padding: 15px 15px 0 15px; margin-top: 40px; }
        .gallery-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scroll-snap-type: x mandatory; }
        .gallery-item { flex: 0 0 85%; scroll-snap-align: center; position: relative; }
        .gallery-item img { width: 100%; height: 220px; object-fit: cover; border-radius: 16px; border: 1px solid var(--border); }
        
        .detail-content { padding: 0 20px 20px 20px; }
        .detail-content h2 { margin: 15px 0 5px 0; color: var(--p); font-size: 1.6rem; }
        
        .btn-water-now { background: #2196f3; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 10px rgba(33,150,243,0.3); }
        
        .info-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); border: 1px solid var(--border); margin-top: 15px; }
        .info-box h4 { margin: 0 0 10px 0; font-size: 0.95rem; opacity: 0.8; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .info-box p { margin: 0; font-size: 0.95rem; line-height: 1.4; }
        
        .history-timeline { border-left: 2px solid var(--p); padding-left: 15px; margin-left: 5px; }
        .history-entry { position: relative; margin-bottom: 15px; font-size: 0.9rem; line-height: 1.4; }
        .history-entry::before { content: ''; position: absolute; left: -21px; top: 4px; width: 10px; height: 10px; background: var(--p); border-radius: 50%; }
        
        textarea.notes-input { width: 100%; height: 80px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; background: var(--input-bg); font-family: inherit; }
        .btn-save-notes { background: var(--p); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .mic-btn { position: absolute; top: 10px; right: 10px; background: var(--p); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .mic-btn.recording { background: var(--warn); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .btn-delete { background: rgba(211,47,47,0.1); color: var(--warn); border: 1px solid var(--warn); padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; overflow: hidden; touch-action: none; }
        #lightbox img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px; transform-origin: center center; transition: transform 0.1s ease-out; }
        .btn-lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 24px; cursor: pointer; z-index: 3500; }
        
        #settings-view { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .settings-box { background: var(--card); padding: 25px; border-radius: 16px; width: 85%; max-width: 320px; text-align: center; position: relative; }
        .btn-modal-close { position: absolute; top: 15px; right: 15px; border: none; background: transparent; font-size: 18px; cursor: pointer; }
        
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 4000; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .spinner { width: 40px; height: 40px; border: 4px solid #fff; border-top-color: var(--p); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
 
<header>
    <h1>🌿 PlantMaster</h1>
    <span class="version-tag">Fáze 2 (Péče & Deník)</span>
    <div class="header-btns">
        <button class="btn-header" onclick="openSettings()">⚙️</button>
    </div>
</header>
 
<div class="container">
    <div class="sticky-controls" id="search-container">
        <input type="text" id="search-box" placeholder="🔍 Hledat podle názvu..." onkeyup="filterPlants()">
        <div class="filter-controls">
            <select id="sort-select" class="filter-select" onchange="filterPlants()">
                <option value="newest">Od nejnovější</option>
                <option value="az">Abecedně A-Z</option>
                <option value="za">Abecedně Z-A</option>
           </select>
            <select id="filter-select" class="filter-select" onchange="filterPlants()">
                <option value="all">Všechno</option>
                <option value="Pokojová rostlina">Pokojovky</option>
                <option value="Keř">Keře</option>
                <option value="Strom">Stromy</option>
                <option value="other">Ostatní</option>
           </select>
        </div>
    </div>
 
    <div class="calendar-section" id="calendar-view">
        <h3 id="calendar-title">📅 Úkoly na tento měsíc</h3>
        <div id="calendar-tasks">Zatím žádné úkoly.</div>
    </div>

    <div id="plant-list"></div>
</div>

<input type="file" id="import-file" accept=".zip" style="display:none">
<button class="fab" onclick="document.getElementById('camera-new').click()">+</button>
<input type="file" id="camera-new" accept="image/*" capture="environment" style="display:none">
 
<div id="detail-view">
    <button class="btn-close" onclick="closeDetail()">✕</button>
    <div class="gallery-wrapper">
        <div class="gallery-scroll" id="det-gallery"></div>
    </div>
    
    <div class="detail-content">
        <h2 id="det-name">Název</h2>
        <div style="margin-bottom: 5px;">
            <div id="det-category" class="cat-badge-small">Druh</div>
        </div>
        
        <button class="btn-water-now" onclick="waterPlantNow()">💧 ZALÍT DNES</button>
        <p id="det-last-watered" style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:5px;"></p>
        
        <div class="info-box" id="det-tasks-box" style="display:none; border-color: var(--p);">
            <h4 style="color: var(--p);">🎯 Úkoly</h4>
            <div id="det-tasks-list"></div>
        </div>

        <div class="info-box"><h4>💧 Jak zalévat</h4><p id="det-water"></p></div>
        <div class="info-box"><h4>☀️ Světlo</h4><p id="det-light"></p></div>
        
        <div class="info-box">
            <h4>📝 Poznámky</h4>
            <div style="position: relative;">
                <textarea id="det-notes" class="notes-input" placeholder="Zadejte poznámku..."></textarea>
                <button id="btn-mic" class="mic-btn" onclick="toggleVoiceRecognition()">🎤</button>
            </div>
            <button class="btn-save-notes" onclick="saveNotes()">💾 Uložit poznámku</button>
        </div>

        <div class="info-box" id="det-history-box" style="display:none;">
            <h4>📜 Historie péče</h4>
            <div class="history-timeline" id="det-history-list"></div>
        </div>

        <button class="btn-delete" onclick="deletePlant()">🗑️ Smazat rostlinu</button>
    </div>
</div>

<div id="lightbox">
    <button class="btn-lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="">
</div>
 
<div id="settings-view">
    <div class="settings-box">
        <button class="btn-modal-close" onclick="closeSettings()">✕</button>
        <h3>⚙️ Nastavení</h3>
        <button style="width:100%; padding:10px; margin-bottom:10px; background:#1976d2; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="exportData()">💾 ZÁLOHOVAT DO .ZIP</button>
        <button style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:none; background:var(--p); color:white; font-weight:bold; cursor:pointer;" onclick="document.getElementById('import-file').click()">📂 OBNOVIT ZE .ZIP ZÁLOHY</button>
        <hr style="border:0; border-top:1px solid #eee; margin-bottom:15px;">
        <button style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; background:#fff; cursor:pointer;" onclick="setKey()">🔑 Zadat API klíč (Gemini)</button>
    </div>
</div>

<div id="loader">
    <div class="spinner"></div>
    <p>Pracuji...</p>
</div>
 
<script>
let db; 
let currentPlants = []; 
let openPlantId = null; 

// SPEECH RECOGNITION
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition; let isRecording = false;
if (SpeechRecognition) {
    recognition = new SpeechRecognition(); recognition.lang = 'cs-CZ';
    recognition.onresult = (e) => {
        const t = e.results[0][0].transcript;
        const field = document.getElementById('det-notes');
        field.value = field.value.trim() ? field.value + "\n- " + t : "- " + t;
        stopVoiceRecognition();
    };
    recognition.onend = stopVoiceRecognition;
}
function toggleVoiceRecognition() {
    if (!SpeechRecognition) return alert("Hlasové zadávání není podporováno v tomto prohlížeči.");
    if (isRecording) { recognition.stop(); } 
    else { document.getElementById('btn-mic').classList.add('recording'); isRecording = true; recognition.start(); }
}
function stopVoiceRecognition() { document.getElementById('btn-mic').classList.remove('recording'); isRecording = false; }

// ZALOŽENÍ DATABÁZE
const req = indexedDB.open("PlantDB", 6);
req.onupgradeneeded = (e) => { 
    db = e.target.result; 
    if (!db.objectStoreNames.contains("plants")) {
        db.createObjectStore("plants", { keyPath: "id", autoIncrement: true }); 
    }
};
req.onsuccess = (e) => { 
    db = e.target.result; 
    render(); 
};

async function render() {
    const tx = db.transaction("plants", "readonly");
    const plants = await new Promise(res => {
        tx.objectStore("plants").getAll().onsuccess = (e) => res(e.target.result);
    });
    
    currentPlants = plants.map(p => {
        if(!p.images || !Array.isArray(p.images) || p.images.length === 0) {
            p.images = [{ data: p.img || '', date: p.dateAdded || "Neznámo" }];
        }
        return p;
    }).reverse();
    
    filterPlants();
}

function filterPlants() {
    const query = document.getElementById('search-box').value.toLowerCase();
    const filterVal = document.getElementById('filter-select').value;
    const sortVal = document.getElementById('sort-select').value;
    
    let filtered = currentPlants.filter(p => {
        const matchesText = p.name ? p.name.toLowerCase().includes(query) : false;
        let matchesFilter = filterVal === "all" || p.category === filterVal;
        if(filterVal === "other" && p.category !== "Pokojová rostlina" && p.category !== "Keř" && p.category !== "Strom") matchesFilter = true;
        return matchesText && matchesFilter;
    });
    
    if(sortVal === "az") filtered.sort((a,b) => (a.name||"").localeCompare(b.name||"", 'cs'));
    if(sortVal === "za") filtered.sort((a,b) => (b.name||"").localeCompare(a.name||"", 'cs'));
    
    const list = document.getElementById('plant-list'); 
    list.innerHTML = '';
    
    filtered.forEach((p) => {
        const originalIndex = currentPlants.indexOf(p);
        const latestImg = p.images[p.images.length - 1].data;
        const badge = p.lastWatered ? `<div class="water-badge-small">💧 ${getWateringText(p.lastWatered)}</div>` : '';
        
        list.innerHTML += `
        <div class="card" onclick="openDetail(${originalIndex})">
            <img src="${latestImg}">
            <div class="card-info">
                <h3>${p.name}</h3>
                <div class="cat-badge-small">${p.category || 'Ostatní'}</div>
                ${badge}
            </div>
        </div>`;
    });
    
    updateCalendar(filtered);
}

function updateCalendar(plantsArray) {
    const months = ["Leden", "Únor", "Březen", "Duben", "Květen", "Červen", "Červenec", "Srpen", "Září", "Říjen", "Listopad", "Prosinec"];
    const curMonth = new Date().getMonth() + 1;
    document.getElementById('calendar-title').innerText = `📅 Úkoly na ${months[curMonth-1]}`;
    
    const calBox = document.getElementById('calendar-tasks'); 
    calBox.innerHTML = '';
    let found = false;
    
    plantsArray.forEach(p => {
        if(p.tasks) p.tasks.forEach(task => {
            if(task.month === curMonth) {
                found = true;
                calBox.innerHTML += `
                <div class="task-item">
                    <div><strong>${p.name}:</strong> ${task.action}</div>
                    <button class="btn-done" onclick="completeTaskWithDetails(${p.id}, '${task.action.replace(/'/g, "\\'")}', ${JSON.stringify(task.products || []).replace(/"/g, '&quot;')}, event)">✓ Splnit</button>
                </div>`;
            }
        });
    });
    if(!found) calBox.innerHTML = '<i>Tento měsíc nejsou žádné úkoly.</i>';
}

function getWateringText(iso) { 
    let d = Math.floor(Math.abs(new Date() - new Date(iso)) / (1000 * 60 * 60 * 24)); 
    return d === 0 ? "Dnes" : (d === 1 ? "Včera" : `Před ${d} dny`); 
}

function openDetail(index) {
    const p = currentPlants[index]; 
    openPlantId = p.id;
    
    const gal = document.getElementById('det-gallery'); 
    gal.innerHTML = '';
    p.images.forEach(img => {
        gal.innerHTML += `<div class="gallery-item"><img src="${img.data}" onclick="openLightbox('${img.data}', event)"></div>`;
    });
    
    document.getElementById('det-name').innerText = p.name || "Neznámá rostlina";
    document.getElementById('det-category').innerText = p.category || "Ostatní";
    document.getElementById('det-water').innerText = p.water || "Neznámé";
    document.getElementById('det-light').innerText = p.light || "Neznámé";
    document.getElementById('det-notes').value = p.notes || "";
    document.getElementById('det-last-watered').innerText = p.lastWatered ? `Poslední zálivka: ${new Date(p.lastWatered).toLocaleDateString('cs-CZ')} (${getWateringText(p.lastWatered)})` : "Zatím nezalito";
    
    // Úkoly v detailu
    const tasksList = document.getElementById('det-tasks-list'); 
    tasksList.innerHTML = '';
    const curMonth = new Date().getMonth() + 1;
    let hasTasks = false;
    if(p.tasks) p.tasks.forEach(t => {
        if(t.month === curMonth) {
            hasTasks = true;
            tasksList.innerHTML += `
            <div class="task-item" style="background:var(--bg); border-color:var(--border);">
                <div><strong>${t.action}</strong></div>
                <button class="btn-done" onclick="completeTaskWithDetails(${p.id}, '${t.action.replace(/'/g, "\\'")}', ${JSON.stringify(t.products || []).replace(/"/g, '&quot;')}, event)">✓ Splnit</button>
            </div>`;
        }
    });
    document.getElementById('det-tasks-box').style.display = hasTasks ? 'block' : 'none';

    // Historie v detailu
    const histList = document.getElementById('det-history-list'); 
    histList.innerHTML = '';
    if(p.history && p.history.length > 0) {
        document.getElementById('det-history-box').style.display = 'block';
        [...p.history].reverse().forEach(h => {
            histList.innerHTML += `<div class="history-entry"><span style="font-weight:bold; color:var(--p); font-size:0.8rem;">${new Date(h.date).toLocaleDateString('cs-CZ')}:</span> ${h.action}</div>`;
        });
    } else {
        document.getElementById('det-history-box').style.display = 'none';
    }
    
    document.getElementById('detail-view').style.display = 'block';
}

function closeDetail() { 
    document.getElementById('detail-view').style.display = 'none'; 
    openPlantId = null; 
    stopVoiceRecognition();
}

// PINCH-TO-ZOOM LIGHTBOX
let curScale = 1; let curX = 0; let curY = 0; let startX = 0; let startY = 0; let startDist = 0; let startScale = 1;
const lb = document.getElementById('lightbox'); 
const lbImg = document.getElementById('lightbox-img');

function openLightbox(src, e) { 
    if(e) e.stopPropagation();
    lbImg.src = src; 
    curScale = 1; curX = 0; curY = 0; 
    updateLB(); 
    lb.style.display = 'flex'; 
}
function closeLightbox() { lb.style.display = 'none'; }
function updateLB() { lbImg.style.transform = `translate(${curX}px, ${curY}px) scale(${curScale})`; }

lb.addEventListener('touchstart', e => {
    if(e.touches.length === 2) { 
        startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); 
        startScale = curScale; 
    }
    else { 
        startX = e.touches[0].clientX - curX; 
        startY = e.touches[0].clientY - curY; 
    }
});
lb.addEventListener('touchmove', e => {
    e.preventDefault();
    if(e.touches.length === 2) {
        let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        curScale = Math.max(1, Math.min(startScale * (dist / startDist), 5));
    } else {
        curX = e.touches[0].clientX - startX; curY = e.touches[0].clientY - startY;
    }
    updateLB();
}, {passive:false});

// FUNKCE PRO PÉČI
function waterPlantNow() {
    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(openPlantId).onsuccess = (e) => {
        let p = e.target.result; 
        p.lastWatered = new Date().toISOString();
        if(!p.history) p.history = []; 
        p.history.push({ date: new Date().toISOString(), action: "Rostlina byla zalita" });
        store.put(p).onsuccess = () => { render().then(() => openDetail(currentPlants.findIndex(x => x.id === openPlantId))); };
    };
}

function saveNotes() {
    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(openPlantId).onsuccess = (e) => {
        let p = e.target.result; 
        p.notes = document.getElementById('det-notes').value;
        store.put(p).onsuccess = () => alert("Poznámka uložena.");
    };
}

async function completeTaskWithDetails(pId, action, suggested, event) {
    if(event) event.stopPropagation();
    let product = "";
    
    if(suggested && suggested.length > 0) {
        let msg = `Úkol: ${action}\nJaký přípravek jste použili?\n\n`;
        suggested.forEach((p, i) => msg += `${i+1}) ${p}\n`);
        msg += "\nZadejte číslo nebo vlastní název (nechte prázdné, pokud nic):";
        let choice = prompt(msg);
        if(choice) {
            let idx = parseInt(choice) - 1;
            product = (!isNaN(idx) && suggested[idx]) ? suggested[idx] : choice;
        }
    } else {
        let choice = prompt(`Splněn úkol: ${action}\nPoužili jste nějaký přípravek nebo substrát?\n(pokud ne, nechte pole prázdné a dejte OK):`);
        if(choice) product = choice;
    }

    let ratio = "";
    if(product) {
        ratio = prompt(`V jakém poměru nebo množství jste přípravek/substrát '${product}' aplikovali?\n(např. 2ml/1l vody, nebo 1 odměrka):`);
    }

    const tx = db.transaction("plants", "readwrite");
    const store = tx.objectStore("plants");
    store.get(pId).onsuccess = (e) => {
        let p = e.target.result; 
        if(!p.history) p.history = [];
        
        let hMsg = `Splněn úkol: ${action}`;
        if(product) { hMsg += ` [Přípravek: ${product}${ratio ? ', Poměr: ' + ratio : ''}]`; }
        
        p.history.push({ date: new Date().toISOString(), action: hMsg });
        store.put(p).onsuccess = () => { 
            render().then(() => { if(openPlantId === pId) openDetail(currentPlants.findIndex(x => x.id === pId)); }); 
        };
    };
}

function deletePlant() { 
    if(confirm("Opravdu smazat tuto rostlinu?")) { 
        db.transaction("plants", "readwrite").objectStore("plants").delete(openPlantId).onsuccess = () => { 
            closeDetail(); 
            render(); 
        }; 
    } 
}

// EXPORT A IMPORT DO .ZIP
function exportData() {
    document.getElementById('loader').style.display = 'flex';
    const zip = new JSZip(); 
    zip.file("databaze.json", JSON.stringify(currentPlants));
    
    const settings = { key: localStorage.getItem('G_KEY') || '' };
    zip.file("nastaveni.json", JSON.stringify(settings));

    zip.generateAsync({type:"blob"}).then(c => {
        const l = document.createElement('a'); 
        l.href = URL.createObjectURL(c); 
        l.download = "PlantMaster_Zaloha.zip"; // ZMĚNA NA ZIP!
        l.click();
        document.getElementById('loader').style.display = 'none';
    });
}

document.getElementById('import-file').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('loader').style.display = 'flex';
    try {
        const zip = new JSZip(); 
        const contents = await zip.loadAsync(file);
        
        const dataStr = await contents.file("databaze.json").async("string");
        const data = JSON.parse(dataStr);
        
        if (contents.file("nastaveni.json")) {
            const setStr = await contents.file("nastaveni.json").async("string");
            const settings = JSON.parse(setStr);
            if (settings.key) localStorage.setItem('G_KEY', settings.key);
        }

        const tx = db.transaction("plants", "readwrite"); 
        const store = tx.objectStore("plants");
        store.clear(); 
        data.forEach(p => { delete p.id; store.add(p); });
        tx.oncomplete = () => { 
            alert("Záloha úspěšně obnovena! Aplikace se nyní restartuje.");
            location.reload(); 
        };
    } catch (err) {
        alert("Chyba při čtení zálohy: Ujistěte se, že jde o správný .zip soubor z PlantMasteru.");
        document.getElementById('loader').style.display = 'none';
    }
};

// KAMERA A GEMINI
document.getElementById('camera-new').onchange = async (e) => {
    const file = e.target.files[0]; 
    const key = localStorage.getItem('G_KEY'); 
    if(!file) return;
    if(!key) return alert("Chybí API klíč! Nastavte ho přes ozubené kolečko (⚙️).");
    
    document.getElementById('loader').style.display = 'flex';
    const reader = new FileReader(); 
    reader.readAsDataURL(file);
    reader.onload = async (ev) => {
        const b64 = ev.target.result.split(',')[1];
        try {
            const prompt = `Jsi expert. JSON: {"name": "Název", "category": "Kategorie (Pokojová rostlina/Keř/Strom/other)", "water": "Stručný návod...", "light": "Stručný návod..."}`;
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: b64 } }] }], generationConfig: { response_mime_type: "application/json" } })
            });
            const data = await resp.json(); 
            let res = JSON.parse(data.candidates[0].content.parts[0].text);
            
            const tx = db.transaction("plants", "readwrite");
            tx.objectStore("plants").add({ 
                ...res, 
                images: [{ data: ev.target.result, date: new Date().toLocaleDateString('cs-CZ') }], 
                dateAdded: new Date().toLocaleDateString('cs-CZ')
            });
            tx.oncomplete = () => { 
                document.getElementById('loader').style.display = 'none'; 
                render(); 
            };
        } catch (err) { 
            alert("Chyba při analýze: " + err.message); 
            document.getElementById('loader').style.display = 'none'; 
        }
    };
};

function setKey() { 
    let k = prompt("Zadejte svůj API klíč pro Gemini:"); 
    if(k) {
        localStorage.setItem('G_KEY', k.trim()); 
        closeSettings();
        alert("Klíč byl uložen.");
    }
}
function openSettings() { document.getElementById('settings-view').style.display = 'flex'; }
function closeSettings() { document.getElementById('settings-view').style.display = 'none'; }
</script>
