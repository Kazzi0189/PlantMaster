<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlantMaster AI v1.0.8</title>
    <style>
        :root { --p: #2e7d32; --bg: #f8fcf8; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .version-tag { font-size: 0.8rem; color: #fff; background: #ff9800; padding: 8px; text-align: center; border-radius: 5px; margin-bottom: 15px; font-weight: bold;}
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        img { width: 100%; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        button { background: var(--p); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        #loader { display: none; text-align: center; padding: 20px; font-weight: bold; color: var(--p); }
        .btn-settings { background: #666; font-size: 0.9rem; }
        .btn-reset { background: #d32f2f; font-size: 0.9rem; }
        .btn-diag { background: #1976d2; font-size: 0.9rem; }
        pre { text-align: left; background: #eee; padding: 10px; border-radius: 5px; overflow-x: auto; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="version-tag">Verze: 1.0.8 (Diagnostika modelů)</div>

<button class="btn-diag" onclick="checkModels()">🔍 ZJISTIT DOSTUPNÉ MODELY</button>
<button class="btn-settings" onclick="setKey()">⚙️ NASTAVIT API KLÍČ</button>
<button class="btn-reset" onclick="hardReset()">🚨 TVRDÝ RESET APLIKACE</button>

<div class="card" id="diag-results" style="display:none;">
    <h3>Dostupné modely pro tvůj klíč:</h3>
    <div id="models-list"></div>
</div>

<hr style="border:1px solid #ddd; margin: 20px 0;">

<div class="card">
    <h2>🌿 Moje zahrada</h2>
    <div id="plant-list">Tady se pak objeví kytky...</div>
</div>

<button onclick="document.getElementById('camera').click()">📸 VYFOTIT ROSTLINU</button>
<input type="file" id="camera" accept="image/*" capture="environment" style="display:none">

<div id="loader">
    <div style="width:30px; height:30px; border:4px solid #ddd; border-top-color:var(--p); border-radius:50%; animation:spin 1s linear infinite; margin:auto;"></div>
    <p id="loader-text">Pracuji...</p>
</div>

<script>
let db;
const req = indexedDB.open("PlantDB", 1);
req.onupgradeneeded = (e) => e.target.result.createObjectStore("plants", { keyPath: "id", autoIncrement: true });
req.onsuccess = (e) => { db = e.target.result; render(); };

function setKey() {
    const k = prompt("Vložte API klíč z Google AI Studio:");
    if (k) { localStorage.setItem('G_KEY', k.trim()); alert("Klíč uložen."); }
}

function hardReset() {
    if(confirm("Smazat paměť aplikace?")) {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = window.location.href.split('?')[0] + '?v=' + new Date().getTime();
    }
}

// NOVÁ DIAGNOSTICKÁ FUNKCE
async function checkModels() {
    const key = localStorage.getItem('G_KEY');
    if (!key) return alert("Chybí API klíč! Nastav ho šedým tlačítkem.");
    
    document.getElementById('loader').style.display = 'block';
    document.getElementById('loader-text').innerText = "Stahuji seznam modelů od Googlu...";
    
    try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`, { cache: 'no-store' });
        const data = await resp.json();
        
        if (!resp.ok) throw new Error(data.error?.message || "Chyba při stahování modelů");

        // Vyfiltrujeme jen ty modely, které umí analyzovat obsah (generateContent)
        const validModels = data.models
            .filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent"))
            .map(m => m.name);

        document.getElementById('loader').style.display = 'none';
        document.getElementById('diag-results').style.display = 'block';
        document.getElementById('models-list').innerHTML = `<pre>${validModels.join('\n')}</pre><p><b>Vyfoť mi tento seznam (nebo ho zkopíruj) a pošli mi ho sem!</b></p>`;
        
    } catch (err) {
        document.getElementById('loader').style.display = 'none';
        alert("Chyba diagnostiky: " + err.message);
    }
}

async function render() {
    const tx = db.transaction("plants", "readonly");
    const plants = await new Promise(res => tx.objectStore("plants").getAll().onsuccess = (e) => res(e.target.result));
    const list = document.getElementById('plant-list');
    list.innerHTML = plants.length ? '' : 'Zatím tu nic není.';
    plants.reverse().forEach(p => {
        list.innerHTML += `<div class="card"><img src="${p.img}"><p><b>${p.name}</b></p></div>`;
    });
}

function resizeImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_W = 800; 
                let w = img.width, h = img.height;
                if (w > MAX_W) { h = Math.round((h * MAX_W) / w); w = MAX_W; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.7)); 
            };
        };
    });
}

document.getElementById('camera').onchange = async (e) => {
    // Zatím zachováme pokus o focení, i když víme, že spadne. Hlavní je teď modré tlačítko.
    const file = e.target.files[0];
    const key = localStorage.getItem('G_KEY');
    if (!file || !key) return;

    document.getElementById('loader').style.display = 'block';
    document.getElementById('loader-text').innerText = "Analyzuji (i když to asi spadne)...";

    try {
        const resizedBase64 = await resizeImage(file);
        const b64Data = resizedBase64.split(',')[1];
        
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
            method: 'POST', cache: 'no-store', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [ { text: "Identify plant. JSON only: {\"name\":\"Název\"}" }, { inline_data: { mime_type: "image/jpeg", data: b64Data } } ]}]
            })
        });

        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error?.message || "Neznámá chyba");

        const tx = db.transaction("plants", "readwrite");
        const resName = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim()).name;
        tx.objectStore("plants").add({ name: resName, img: resizedBase64 });
        tx.oncomplete = () => { document.getElementById('loader').style.display = 'none'; render(); };

    } catch (err) {
        document.getElementById('loader').style.display = 'none';
        alert("Chyba při focení: " + err.message);
    }
};
</script>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
